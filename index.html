<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📓 Bloc de Notas - Laboratorio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    
    <!-- ===== NUEVA LIBRERÍA DE GOOGLE (IMPORTANTE) ===== -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="container">
        <!-- Encabezado -->
        <header>
            <h1>📓 Bloc de Notas</h1>
            <p class="subtitulo">Apuntes de laboratorio - Electrónica</p>
        </header>

        <!-- Panel de control -->
        <div class="panel">
            <button id="btnNuevo" onclick="nuevoApunte()">➕ Nuevo</button>
             <button id="btnSincronizar" onclick="manejarSincronizacion()">🔑 Iniciar sesión</button>
            <button id="btnExportar" onclick="exportarTXT()">📤 Exportar TXT</button>
            <button id="btnLimpiar" onclick="limpiarTodo()" style="background:#da3633; color:white;">🧹 Limpiar todo</button>
        </div>

        <!-- Área de edición -->
        <div class="editor">
            <input type="text" id="titulo" placeholder="Título del apunte..." />
            <textarea id="contenido" placeholder="Escribe tus apuntes aquí..."></textarea>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button onclick="guardarApunte()" id="btnGuardar" style="flex:1;">💾 Guardar</button>
                <button onclick="eliminarApunte()" id="btnEliminar" style="flex:0.5; background:#da3633; color:white;">🗑️ Eliminar</button>
            </div>
        </div>

        <!-- Lista de apuntes guardados -->
        <div class="lista">
            <h3>📚 Mis Apuntes</h3>
            <ul id="listaApuntes"></ul>
        </div>
    </div>

    <!-- CARGAR PRIMERO LA LIBRERÍA Y LUEGO TU CÓDIGO -->
    <script src="app.js"></script>
</body>
</html>
